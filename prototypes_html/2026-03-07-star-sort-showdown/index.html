<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Star Sort Showdown</title>
<style>body{font-family:Inter,system-ui;background:radial-gradient(circle at top,#1e2348,#0c1022 55%);color:#eef2ff;margin:0;padding:20px}.wrap{max-width:980px;margin:0 auto}.panel{background:#151b39;border:1px solid #3e4b85;border-radius:14px;padding:14px;margin-bottom:14px}h1{margin:0 0 8px}button{background:#5c78ff;color:#fff;border:0;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer}button:disabled{opacity:.45}.muted{color:#b8c4f0}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-top:12px}.card{background:#202a58;border:1px solid #5263a8;border-radius:12px;padding:10px;cursor:pointer;min-height:92px}.sel{outline:3px solid #ffd34a}.stars{font-size:20px;letter-spacing:2px}.badge{display:inline-block;padding:4px 8px;border-radius:999px;background:#2b356d;color:#dce4ff;margin-right:8px}#feedback{font-weight:700;min-height:24px}</style></head><body><div class="wrap">
<div class="panel"><h1>⭐ Star Sort Showdown</h1><p>Tap two cards to swap. Sort from 1⭐ to 5⭐. Clear 3 rounds in 120s. Wrong checks cost 8s. Score + badge at the end.</p><div><span class="badge" id="round">Round 1/3</span><span class="badge" id="time">Time 120</span><span class="badge" id="score">Score 0</span><span class="badge" id="checks">Checks 6</span></div><p id="feedback" class="muted">Hit Start to begin.</p><button id="start">Start Game</button> <button id="check" disabled>Check Order</button> <button id="restart">Restart</button></div>
<div class="panel"><div id="cards" class="cards"></div></div><div class="panel"><p id="result" class="muted">No run completed yet.</p></div></div>
<script>
const cardsEl=document.getElementById('cards'),fb=document.getElementById('feedback');
const roundEl=document.getElementById('round'),timeEl=document.getElementById('time'),scoreEl=document.getElementById('score'),checksEl=document.getElementById('checks');
let deck=[],sel=-1,round=1,time=120,score=0,checks=6,live=false,timer;const maxRound=3;
const lines=['Laggy menus','Clean UI','Fair challenge','Great soundtrack','Daily mission addicting','Too many ads','Relaxing flow','Excellent updates'];
function makeDeck(){deck=[];for(let i=0;i<8;i++){deck.push({id:i,text:lines[i],rating:1+Math.floor(Math.random()*5)})}deck.sort(()=>Math.random()-.5)}
function render(){cardsEl.innerHTML='';deck.forEach((c,i)=>{const d=document.createElement('div');d.className='card'+(i===sel?' sel':'');d.innerHTML=`<div class=stars>${'★'.repeat(c.rating)}${'☆'.repeat(5-c.rating)}</div><div>${c.text}</div>`;d.onclick=()=>pick(i);cardsEl.appendChild(d)});roundEl.textContent=`Round ${round}/${maxRound}`;timeEl.textContent=`Time ${time}`;scoreEl.textContent=`Score ${score}`;checksEl.textContent=`Checks ${checks}`}
function pick(i){if(!live)return;if(sel===-1)sel=i;else if(sel===i)sel=-1;else{[deck[sel],deck[i]]=[deck[i],deck[sel]];sel=-1;score=Math.max(0,score-3);fb.textContent='Swapped.';render()}}
function sorted(){for(let i=1;i<deck.length;i++)if(deck[i-1].rating>deck[i].rating)return false;return true}
function checkOrder(){if(!live)return;checks--;if(sorted()){const bonus=40+time;score+=bonus;fb.textContent=`Round ${round} clear! +${bonus}`;round++;if(round>maxRound)return end(true);checks=6;makeDeck()}else{time=Math.max(0,time-8);score=Math.max(0,score-12);fb.textContent='Not sorted. -8s';if(checks<=0)return end(false)}render()}
function tick(){if(!live)return;time--;if(time<=0)return end(false);render()}
function badge(){if(score>=280)return 'Legend Strategist';if(score>=210)return 'Gold Curator';if(score>=140)return 'Silver Critic';return 'Bronze Rater'}
function end(win){live=false;clearInterval(timer);document.getElementById('check').disabled=true;document.getElementById('result').textContent=(win?'🏆 WIN! ':'💥 GAME OVER. ')+`Score ${score}. Badge: ${badge()}`;fb.textContent=win?'Excellent sorting discipline.':'No time/checks left.'}
function start(){round=1;time=120;score=0;checks=6;sel=-1;live=true;makeDeck();render();fb.textContent='Sort ascending then Check.';document.getElementById('check').disabled=false;clearInterval(timer);timer=setInterval(tick,1000)}
document.getElementById('start').onclick=start;document.getElementById('restart').onclick=start;document.getElementById('check').onclick=checkOrder;render();
</script></body></html>
