<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Word Arrow Escape</title><style>body{margin:0;background:#0d1a1f;color:#ebf9ff;font-family:Inter,Arial;padding:18px}.wrap{max-width:920px;margin:auto}.panel{background:#132a32;border:1px solid #2f5967;border-radius:12px;padding:12px;margin-bottom:12px}.grid{display:grid;grid-template-columns:repeat(5,56px);gap:8px;justify-content:center}.cell{width:56px;height:56px;border-radius:10px;background:#1d414c;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800}.player{outline:3px solid #ffd95e}.trail{background:#2f7b90}.trap{box-shadow:inset 0 0 0 3px #f15f6f}button{padding:10px 12px;border:0;border-radius:10px;background:#45b0ff;color:#001;font-weight:700;cursor:pointer}</style></head><body><div class="wrap"><div class="panel"><h1>➡️ Word Arrow Escape</h1><p>Move with arrow keys or buttons. Step on letters to spell each target word in order. Avoid traps. 3 hearts total. Finish all words to win.</p><p><b>Target:</b> <span id="target">-</span> | <b>Built:</b> <span id="built">-</span> | <b>Hearts:</b> <span id="hearts">3</span> | <b>Time:</b> <span id="time">90</span> | <b>Score:</b> <span id="score">0</span></p><button id="start">Start</button> <button onclick="move(0,-1)">↑</button><button onclick="move(-1,0)">←</button><button onclick="move(1,0)">→</button><button onclick="move(0,1)">↓</button> <button id="restart">Restart</button><p id="fb">Press Start.</p></div><div class="panel"><div class="grid" id="grid"></div></div><div class="panel"><p id="result">No run completed yet.</p></div></div><script>const words=['WORD','ESCAPE','ARROW','MAZE'],letters='WORDLESCAPEARROWMAZEFIVESTARS';let board=[],px=0,py=0,idx=0,built='',hearts=3,time=90,score=0,live=false,timer;function seedBoard(){board=[];for(let y=0;y<5;y++){let row=[];for(let x=0;x<5;x++)row.push({ch:letters[(x+y*5)%letters.length],trap:Math.random()<0.12});board.push(row)};words.join('').split('').forEach(ch=>{let x=Math.floor(Math.random()*5),y=Math.floor(Math.random()*5);board[y][x].ch=ch;board[y][x].trap=false});px=0;py=0;board[0][0].trap=false}function draw(){const g=document.getElementById('grid');g.innerHTML='';for(let y=0;y<5;y++)for(let x=0;x<5;x++){const c=board[y][x],d=document.createElement('div');d.className='cell'+(x===px&&y===py?' player':'')+(c.used?' trail':'')+(c.trap?' trap':'');d.textContent=c.ch;g.appendChild(d)};target.textContent=words[idx]||'-';builtSpan.textContent=built||'-';heartsSpan.textContent=hearts;timeSpan.textContent=time;scoreSpan.textContent=score}const target=document.getElementById('target'),builtSpan=document.getElementById('built'),heartsSpan=document.getElementById('hearts'),timeSpan=document.getElementById('time'),scoreSpan=document.getElementById('score');function msg(t){fb.textContent=t}function move(dx,dy){if(!live)return;const nx=px+dx,ny=py+dy;if(nx<0||ny<0||nx>4||ny>4)return;px=nx;py=ny;const c=board[py][px];if(c.trap){hearts--;c.trap=false;score=Math.max(0,score-20);msg('Trap hit!');if(hearts<=0)return end(false)}const targetWord=words[idx],next=targetWord[built.length];if(c.ch===next){built+=c.ch;c.used=true;score+=15;msg('Correct letter!');if(built===targetWord){score+=40+time;idx++;built='';msg('Word cleared!');if(idx>=words.length)return end(true)}}else if(built.length>0){built='';score=Math.max(0,score-5);msg('Sequence broke.')}draw()}function tick(){if(!live)return;time--;if(time<=0)return end(false);draw()}function end(win){live=false;clearInterval(timer);result.textContent=(win?'🏆 WIN! ':'💥 GAME OVER. ')+`Score ${score}. Badge: ${score>=260?'Path Legend':score>=180?'Arrow Master':score>=110?'Maze Scout':'Rookie Runner'}`;msg(win?'All words escaped!':'Out of hearts/time.')}function start(){seedBoard();idx=0;built='';hearts=3;time=90;score=0;live=true;draw();msg('Find WORD first.');clearInterval(timer);timer=setInterval(tick,1000)}start.onclick=start;restart.onclick=start;window.addEventListener('keydown',e=>{if(e.key==='ArrowUp')move(0,-1);if(e.key==='ArrowDown')move(0,1);if(e.key==='ArrowLeft')move(-1,0);if(e.key==='ArrowRight')move(1,0)});seedBoard();draw();</script></body></html>
