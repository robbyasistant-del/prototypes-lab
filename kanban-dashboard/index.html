<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Robby Kanban Dashboard</title>
  <style>
    :root{
      --bg:#0a1022;
      --panel:#111a35;
      --panel2:#0f1731;
      --card:#1a2546;
      --line:#2c3f72;
      --text:#edf2ff;
      --muted:#9db0dc;
      --accent:#7c8bff;
      --backlog:#6b7280;
      --todo:#f59e0b;
      --inprogress:#3b82f6;
      --done:#22c55e;
      --high:#ef4444;
      --medium:#f59e0b;
      --low:#22c55e;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,Segoe UI,Arial,sans-serif;
      color:var(--text);
      background: radial-gradient(1200px 700px at 20% -10%, #18285c 0%, var(--bg) 60%);
      min-height:100vh;
    }
    .top{
      display:flex; justify-content:space-between; align-items:center; gap:12px;
      padding:14px 18px; border-bottom:1px solid #22345f; background:#0c1430cc; backdrop-filter:blur(6px);
      position:sticky; top:0; z-index:50;
    }
    .title{display:flex; align-items:center; gap:10px; font-weight:700}
    .title small{display:block; color:var(--muted); font-weight:500}
    .stats{display:flex; gap:8px; flex-wrap:wrap}
    .pill{background:#141f40; border:1px solid #2d4171; border-radius:10px; padding:8px 10px; min-width:92px; text-align:center}
    .pill b{display:block; font-size:17px}
    .layout{display:grid; grid-template-columns: 1fr 320px; gap:14px; padding:14px;}
    .board{display:grid; grid-template-columns:repeat(4,minmax(240px,1fr)); gap:12px;}
    .col{background:linear-gradient(180deg,#111b39,#0e1732); border:1px solid #2a3f70; border-radius:14px; display:flex; flex-direction:column; min-height:76vh}
    .col-head{padding:10px 12px; border-bottom:1px solid #2a3f70; display:flex; justify-content:space-between; align-items:center; font-size:13px; font-weight:700; letter-spacing:.4px; text-transform:uppercase}
    .dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:6px}
    .count{background:#22345f;border:1px solid #35518e;border-radius:99px;padding:1px 7px;font-size:12px;color:#d6e2ff}
    .drop{padding:10px; display:flex; flex-direction:column; gap:9px; flex:1}
    .task{background:var(--card); border:1px solid #2e4479; border-radius:12px; padding:10px; cursor:grab; box-shadow:0 8px 18px #00000036}
    .task:active{cursor:grabbing}
    .task .t{font-weight:700; margin-bottom:5px; font-size:14px}
    .task .d{font-size:12px; color:var(--muted); white-space:pre-wrap; margin-bottom:8px}
    .task .meta{display:flex; justify-content:space-between; align-items:center; gap:8px}
    .task .meta-left{display:flex; align-items:center; gap:8px}
    .prio{font-size:11px; font-weight:700; text-transform:uppercase; padding:2px 7px; border-radius:999px; color:#081024}
    .prio.high{background:var(--high)} .prio.medium{background:var(--medium)} .prio.low{background:var(--low)}
    .task .mini{font-size:11px;color:#90a6d5}
    .delete-btn{background:#1a2546;border:1px solid #3f558f;color:#ffb4b4;border-radius:8px;padding:3px 7px;cursor:pointer;font-size:13px;line-height:1}
    .delete-btn:hover{background:#2a1733;border-color:#7e3b5d}

    .side{background:linear-gradient(180deg,#121d3d,#0e1731); border:1px solid #2a3f70; border-radius:14px; padding:12px; min-height:76vh; display:flex; flex-direction:column; gap:12px}
    .cta{background:linear-gradient(180deg,#7f8fff,#6d7df1); color:white; border:none; border-radius:12px; padding:12px; font-weight:800; cursor:pointer}
    .box{background:#141f42; border:1px solid #2a4277; border-radius:12px; padding:10px}
    .box h3{margin:0 0 8px; font-size:14px}
    input,textarea,select,button{font:inherit}
    input,textarea,select{width:100%; background:#0f1834; border:1px solid #314c86; color:var(--text); border-radius:10px; padding:9px}
    textarea{min-height:86px; resize:vertical}
    .row{display:grid; grid-template-columns:1fr 1fr; gap:8px}
    .btn{background:var(--accent); color:#081229; border:none; border-radius:10px; padding:9px 10px; font-weight:700; cursor:pointer}
    .ghost{background:#182954;color:#dfe8ff;border:1px solid #36579a}
    .log{font-size:12px; color:#afc0e8; max-height:220px; overflow:auto; line-height:1.35}

    .cron-wrap{margin:0 14px 14px; background:linear-gradient(180deg,#121d3d,#0e1731); border:1px solid #2a3f70; border-radius:14px; padding:12px}
    .cron-head{display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:10px}
    .cron-head h3{margin:0; font-size:14px}
    .cron-meta{font-size:12px; color:var(--muted)}
    .cron-list{display:flex; flex-direction:column; gap:10px}
    .cron-card{width:100%; background:#141f42; border:1px solid #2a4277; border-radius:12px; padding:10px}
    .cron-top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:8px}
    .cron-name{font-weight:700; font-size:13px}
    .cron-grid{display:grid; grid-template-columns:repeat(4,minmax(140px,1fr)); gap:8px; margin-bottom:8px}
    .cron-line{font-size:12px; color:#c8d6fb; margin:0}
    .cron-message{font-size:12px; color:#dfe8ff; background:#0f1834; border:1px solid #314c86; border-radius:10px; padding:8px; white-space:pre-wrap; word-break:break-word; max-height:180px; overflow:auto}
    .cron-output{margin-top:8px; font-size:12px; color:#cfe0ff}
    .cron-output a{color:#9ec1ff; text-decoration:none}
    .cron-output a:hover{text-decoration:underline}
    .tag{display:inline-block; border-radius:999px; padding:2px 8px; font-size:11px; font-weight:700}
    .tag.ok{background:#15442a; color:#86efac; border:1px solid #226c43}
    .tag.error{background:#4b1f2d; color:#fca5a5; border:1px solid #7f3551}
    .tag.unknown{background:#25345e; color:#c6d3f8; border:1px solid #3b548f}

    @media (max-width:1200px){ .layout{grid-template-columns:1fr}.side{min-height:auto}.board{grid-template-columns:repeat(2,minmax(220px,1fr));}.cron-grid{grid-template-columns:repeat(2,minmax(140px,1fr));}}
    @media (max-width:760px){ .board{grid-template-columns:1fr}.cron-grid{grid-template-columns:1fr} }
  </style>
</head>
<body>
  <div class="top">
    <div class="title">
      <span>📋 Robby Dashboard</span>
      <small>Backlog · Todo · In Progress · Done</small>
    </div>
    <div class="stats" id="stats"></div>
  </div>

  <div class="layout">
    <section class="board" id="board"></section>

    <aside class="side">
      <button class="cta" id="runNow">⚡ Ejecutar tareas de "Todo" a "In Progress"</button>

      <div class="box">
        <h3>Nueva tarea</h3>
        <input id="newTitle" placeholder="¿Qué hay que hacer?" />
        <textarea id="newDesc" placeholder="Descripción (opcional)"></textarea>
        <div class="row" style="margin-top:8px">
          <select id="newPriority">
            <option value="medium">Medium</option>
            <option value="high">High</option>
            <option value="low">Low</option>
          </select>
          <select id="newColumn">
            <option value="backlog">Backlog</option>
            <option value="todo" selected>Todo</option>
            <option value="inprogress">In Progress</option>
            <option value="done">Done</option>
          </select>
        </div>
        <button class="btn" id="addBtn" style="margin-top:8px;width:100%">+ Añadir tarea</button>
      </div>

      <div class="box">
        <h3>Gestión</h3>
        <div class="row">
          <button class="ghost" id="exportBtn">Export JSON</button>
          <button class="ghost" id="importBtn">Import JSON</button>
        </div>
        <button class="ghost" id="clearDone" style="margin-top:8px;width:100%">Limpiar Done</button>
      </div>

      <div class="box">
        <h3>Actividad</h3>
        <div class="log" id="log"></div>
      </div>
    </aside>
  </div>

  <section class="cron-wrap">
    <div class="cron-head">
      <h3>Cron jobs configurados (solo lectura)</h3>
      <div class="cron-meta" id="cronMeta">Cargando…</div>
    </div>
    <div class="cron-list" id="cronList"></div>
  </section>

<script>
const STORAGE='robby-kanban-v3';
const ACTIVITY='robby-kanban-activity-v3';
const COLUMNS=[
  {id:'backlog', title:'Backlog', color:'var(--backlog)'},
  {id:'todo', title:'Todo', color:'var(--todo)'},
  {id:'inprogress', title:'In Progress', color:'var(--inprogress)'},
  {id:'done', title:'Done', color:'var(--done)'},
];
let state = load(STORAGE,{backlog:[],todo:[],inprogress:[],done:[]});
let activity = load(ACTIVITY,[]);

function load(k,d){try{const x=localStorage.getItem(k); return x?JSON.parse(x):d}catch{return d}}
function save(){localStorage.setItem(STORAGE,JSON.stringify(state)); localStorage.setItem(ACTIVITY,JSON.stringify(activity.slice(0,120)))}
function id(){return Math.random().toString(36).slice(2,10)}
function esc(s=''){return s.replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function now(){return new Date().toLocaleString('es-ES',{hour12:false})}

function log(msg){activity.unshift(`[${now()}] ${msg}`); save(); renderLog()}
function renderLog(){document.getElementById('log').innerHTML = activity.slice(0,30).map(x=>`<div>${esc(x)}</div>`).join('')}

function renderStats(){
  const s=document.getElementById('stats');
  s.innerHTML='';
  COLUMNS.forEach(c=>{
    const n=state[c.id].length;
    const el=document.createElement('div');
    el.className='pill'; el.innerHTML=`<b>${n}</b><span>${c.title}</span>`;
    s.appendChild(el);
  });
}

function renderBoard(){
  const b=document.getElementById('board'); b.innerHTML='';
  COLUMNS.forEach(c=>{
    const col=document.createElement('section'); col.className='col';
    col.innerHTML=`<div class='col-head'><span><i class='dot' style='background:${c.color}'></i>${c.title}</span><span class='count'>${state[c.id].length}</span></div><div class='drop' data-col='${c.id}'></div>`;
    const drop=col.querySelector('.drop');
    drop.addEventListener('dragover',e=>e.preventDefault());
    drop.addEventListener('drop',onDrop);

    state[c.id].forEach(t=>{
      const card=document.createElement('article');
      card.className='task'; card.draggable=true; card.dataset.id=t.id; card.dataset.from=c.id;
      card.innerHTML=`<div class='t'>${esc(t.title)}</div><div class='d'>${esc(t.desc||'')}</div><div class='meta'><div class='meta-left'><span class='prio ${t.priority||'medium'}'>${t.priority||'medium'}</span><span class='mini'>doble click = editar</span></div><button class='delete-btn' title='Eliminar tarea'>🗑️</button></div>`;
      card.addEventListener('dragstart',onDragStart);
      card.addEventListener('dblclick',()=>editTask(c.id,t.id));
      card.querySelector('.delete-btn').addEventListener('click',(e)=>{ e.stopPropagation(); deleteTask(c.id,t.id); });
      drop.appendChild(card);
    });

    b.appendChild(col);
  });
}

let dragged=null;
function onDragStart(e){dragged={id:e.currentTarget.dataset.id,from:e.currentTarget.dataset.from}}
function onDrop(e){
  e.preventDefault(); if(!dragged) return;
  const to=e.currentTarget.dataset.col, from=dragged.from;
  const i=state[from].findIndex(x=>x.id===dragged.id); if(i<0) return;
  const [task]=state[from].splice(i,1); state[to].push(task);
  log(`Movida "${task.title}" de ${from} → ${to}`);
  dragged=null; save(); render();
}

function editTask(col,id){
  const i=state[col].findIndex(x=>x.id===id); if(i<0) return;
  const t=state[col][i];
  const title=prompt('Título',t.title); if(title===null) return;
  const desc=prompt('Descripción',t.desc||''); if(desc===null) return;
  const p=prompt('Prioridad (high|medium|low)',t.priority||'medium');
  const pr=['high','medium','low'].includes((p||'').toLowerCase())?(p||'medium').toLowerCase():(t.priority||'medium');
  state[col][i]={...t,title:title.trim()||t.title,desc:desc.trim(),priority:pr};
  log(`Editada "${state[col][i].title}"`);
  save(); render();
}

function deleteTask(col,id){
  const i=state[col].findIndex(x=>x.id===id); if(i<0) return;
  const t=state[col][i];
  if(!confirm(`¿Eliminar tarea "${t.title}"?`)) return;
  state[col].splice(i,1);
  log(`Eliminada "${t.title}" de ${col}`);
  save(); render();
}

function addTask(){
  const title=document.getElementById('newTitle').value.trim(); if(!title) return;
  const desc=document.getElementById('newDesc').value.trim();
  const priority=document.getElementById('newPriority').value;
  const col=document.getElementById('newColumn').value;
  const task={id:id(),title,desc,priority,createdAt:Date.now()};
  state[col].push(task);
  document.getElementById('newTitle').value=''; document.getElementById('newDesc').value='';
  log(`Nueva tarea en ${col}: "${title}"`);
  save(); render();
}

function statusClass(s){if(s==='ok') return 'ok'; if(s==='error') return 'error'; return 'unknown'}
function fmtMs(ms){if(!ms) return '—'; try{return new Date(ms).toLocaleString('es-ES',{hour12:false})}catch{return '—'}}

function outputTargetForJob(j){
  const n=(j.name||'').toLowerCase();
  if(n==='market-intel-crawl-0310') return {label:'C:/Users/robby/.openclaw/workspace/market_intel/reports/daily_trend_report.html', href:'file:///C:/Users/robby/.openclaw/workspace/market_intel/reports/daily_trend_report.html'};
  if(n==='aso-growth-intel-0745') return {label:'C:/Users/robby/.openclaw/workspace/market_intel/reports/<YYYY-MM-DD>-aso-growth-brief.md', href:'file:///C:/Users/robby/.openclaw/workspace/market_intel/reports'};
  if(n==='aso-growth-close-2130') return {label:'C:/Users/robby/.openclaw/workspace/market_intel/reports/<YYYY-MM-DD>-close-summary.md', href:'file:///C:/Users/robby/.openclaw/workspace/market_intel/reports'};
  if(n==='aso-weekly-strategy-sunday-2100') return {label:'C:/Users/robby/.openclaw/workspace/market_intel/reports/<YYYY-[W]WW>-weekly-strategy.md', href:'file:///C:/Users/robby/.openclaw/workspace/market_intel/reports'};
  if(n==='daily-game-factory-0801') return {label:'https://robbyasistant-del.github.io/prototypes-lab/', href:'https://robbyasistant-del.github.io/prototypes-lab/'};
  if(n==='playstore-top20-nightly') return {label:'C:/Users/robby/.openclaw/workspace/prototypes/_market/top20-latest.html', href:'file:///C:/Users/robby/.openclaw/workspace/prototypes/_market/top20-latest.html'};
  if(n==='x-trends-daily-0800') return {label:'Resumen enviado por mensaje (sin fichero fijo)', href:''};
  return {label:'(sin ruta definida aún)', href:''};
}

async function renderCronJobs(){
  const list=document.getElementById('cronList');
  const meta=document.getElementById('cronMeta');
  list.innerHTML='';
  try{
    const res=await fetch(`cron-jobs.json?t=${Date.now()}`,{cache:'no-store'});
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data=await res.json();
    const jobs=(data.jobs||[]).slice().sort((a,b)=>{
      const [ma,ha]=String(a.schedule?.expr||'').split(' ');
      const [mb,hb]=String(b.schedule?.expr||'').split(' ');
      const toNum=v=>Number.isFinite(Number(v))?Number(v):99;
      const va=toNum(ha)*60+toNum(ma);
      const vb=toNum(hb)*60+toNum(mb);
      return va-vb;
    });
    meta.textContent=`${jobs.length} jobs · ordenados por hora · snapshot ${data.generatedAt||'sin fecha'}`;
    if(!jobs.length){
      list.innerHTML=`<div class='cron-card'><div class='cron-line'>No hay jobs en el snapshot.</div></div>`;
      return;
    }
    jobs.forEach(j=>{
      const status=j.state?.lastStatus||'unknown';
      const card=document.createElement('article');
      card.className='cron-card';
      const msg=j.payload?.message||'—';
      const out=outputTargetForJob(j);
      const outHtml=out.href
        ? `<a href='${esc(out.href)}' target='_blank' rel='noreferrer'>${esc(out.label)}</a>`
        : esc(out.label);
      card.innerHTML=`
        <div class='cron-top'>
          <div class='cron-name'>${esc(j.name||j.id||'sin nombre')}</div>
          <div class='cron-line'>Estado: <span class='tag ${statusClass(status)}'>${esc(status)}</span></div>
        </div>
        <div class='cron-grid'>
          <div class='cron-line'>⏱ ${esc(j.schedule?.expr||'—')}</div>
          <div class='cron-line'>🌍 ${esc(j.schedule?.tz||'—')}</div>
          <div class='cron-line'>Próxima: ${esc(fmtMs(j.state?.nextRunAtMs))}</div>
          <div class='cron-line'>Última: ${esc(fmtMs(j.state?.lastRunAtMs))}</div>
        </div>
        <div class='cron-output'><b>Salida principal:</b> ${outHtml}</div>
        <div class='cron-line' style='margin:8px 0 4px'>Message al agente:</div>
        <div class='cron-message'>${esc(msg)}</div>
      `;
      list.appendChild(card);
    });
  }catch(e){
    meta.textContent='No se pudo leer cron-jobs.json';
    list.innerHTML=`<div class='cron-card'><div class='cron-line'>Error cargando snapshot de cron jobs.</div><div class='cron-line'>Detalle: ${esc(String(e.message||e))}</div></div>`;
  }
}

function render(){renderStats(); renderBoard(); renderLog();}

// Actions

document.getElementById('addBtn').onclick=addTask;
document.getElementById('runNow').onclick=()=>{
  if(!state.todo.length){log('No hay tareas en Todo'); return;}
  const moved=[...state.todo]; state.inprogress.push(...moved); state.todo=[];
  log(`Ejecución rápida: ${moved.length} tareas de Todo → In Progress`);
  save(); render();
};

document.getElementById('clearDone').onclick=()=>{
  const n=state.done.length; state.done=[]; log(`Limpieza Done: ${n} tareas eliminadas`); save(); render();
};

document.getElementById('exportBtn').onclick=()=>{
  const blob=new Blob([JSON.stringify({state,activity},null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='kanban-dashboard-backup.json'; a.click();
  URL.revokeObjectURL(a.href);
};

document.getElementById('importBtn').onclick=()=>{
  const i=document.createElement('input'); i.type='file'; i.accept='application/json';
  i.onchange=async()=>{const f=i.files[0]; if(!f) return; try{const j=JSON.parse(await f.text()); if(j.state){state=j.state; activity=j.activity||activity; save(); render(); log('Importación completada');} else alert('Formato inválido');}catch{alert('JSON inválido')}};
  i.click();
};

render();
renderCronJobs();
</script>
</body>
</html>
