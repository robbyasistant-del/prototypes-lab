<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Piano Tile Relay</title><style>body{font-family:Inter,Arial;background:#120b1d;color:#f8f0ff;margin:0;padding:20px}.wrap{max-width:860px;margin:auto}.panel{background:#211337;border:1px solid #533e7e;border-radius:12px;padding:12px;margin-bottom:12px}.lane{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.tile{height:110px;border-radius:12px;background:#352259;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;cursor:pointer;user-select:none}.flash{background:#a26cff;color:#160724}.ok{box-shadow:0 0 0 3px #34d399 inset}.bad{box-shadow:0 0 0 3px #fb7185 inset}button{padding:10px 12px;border:0;border-radius:10px;background:#a26cff;color:#180a2f;font-weight:800}</style></head><body><div class="wrap"><div class="panel"><h1>🎹 Piano Tile Relay</h1><p>Watch sequence then replay exactly. 5 rounds. Max 2 mistakes. Faster finish = more score.</p><p>Round <span id="round">0</span>/5 | Mistakes <span id="mist">0</span>/2 | Time <span id="time">75</span> | Score <span id="score">0</span></p><button id="start">Start</button> <button id="restart">Restart</button><p id="fb">Press Start.</p></div><div class="panel"><div class="lane" id="lane"></div></div><div class="panel"><p id="result">No run completed yet.</p></div></div><script>const notes=['C','D','E','G'],lane=document.getElementById('lane');let seq=[],input=0,round=0,mist=0,time=75,score=0,live=false,busy=false,timer;for(let i=0;i<4;i++){const d=document.createElement('div');d.className='tile';d.textContent=notes[i];d.onclick=()=>tap(i,d);lane.appendChild(d)}const tiles=[...document.querySelectorAll('.tile')];function ui(){roundEl.textContent=round;mistEl.textContent=mist;timeEl.textContent=time;scoreEl.textContent=score}const roundEl=document.getElementById('round'),mistEl=document.getElementById('mist'),timeEl=document.getElementById('time'),scoreEl=document.getElementById('score');function say(t){fb.textContent=t}function gen(){seq=[];for(let i=0;i<round+2;i++)seq.push(Math.floor(Math.random()*4));input=0}async function show(){busy=true;say('Watch...');for(const i of seq){tiles[i].classList.add('flash');await new Promise(r=>setTimeout(r,360));tiles[i].classList.remove('flash');await new Promise(r=>setTimeout(r,160))}busy=false;say('Your turn.')}function tap(i,el){if(!live||busy)return;const ok=seq[input]===i;el.classList.add(ok?'ok':'bad');setTimeout(()=>el.classList.remove('ok','bad'),180);if(ok){score+=12;input++;if(input===seq.length){score+=30+time;round++;if(round>5)return end(true);gen();show();ui()}}else{mist++;score=Math.max(0,score-15);say('Wrong tile!');if(mist>2)return end(false);input=0}ui()}function tick(){if(!live)return;time--;if(time<=0)return end(false);ui()}function end(win){live=false;clearInterval(timer);result.textContent=(win?'🏆 WIN! ':'💥 GAME OVER. ')+`Score ${score}. Badge: ${score>=340?'Maestro Legend':score>=250?'Gold Virtuoso':score>=160?'Silver Rhythm':'Bronze Listener'}`;say(win?'Relay complete!':'Out of time/mistakes.')}function startGame(){round=1;mist=0;time=75;score=0;live=true;gen();show();clearInterval(timer);timer=setInterval(tick,1000);ui();say('Memorize first pattern.')}start.onclick=startGame;restart.onclick=startGame;ui();</script></body></html>
